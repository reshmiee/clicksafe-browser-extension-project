<!-- ClickSafe Warning Modal -->
<div id="clicksafe-modal-overlay" style="
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 999999;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
">
  <div id="clicksafe-modal-box" style="
    background: white;
    border-radius: 12px;
    padding: 32px;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  ">
    <div style="font-size: 48px; margin-bottom: 12px;" id="clicksafe-modal-icon">⚠️</div>
    <h2 style="color: #dc2626; margin: 0 0 8px 0; font-size: 20px;" id="clicksafe-modal-title">
      Dangerous Link Detected!
    </h2>
    <p style="color: #6b7280; margin: 0 0 8px 0; font-size: 14px;" id="clicksafe-modal-threat"></p>
    <p style="color: #374151; margin: 0 0 24px 0; font-size: 14px;" id="clicksafe-modal-url"
      style="word-break: break-all;"></p>

    <div style="display: flex; gap: 12px; justify-content: center;">
      <button id="clicksafe-go-back" style="
        background: #16a34a;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        font-weight: bold;
      ">Go Back (Safe)</button>

      <button id="clicksafe-proceed" style="
        background: #f3f4f6;
        color: #6b7280;
        border: 1px solid #d1d5db;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      ">Proceed Anyway (Risky)</button>
    </div>
  </div>
</div>
